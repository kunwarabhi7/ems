version: "3.9"

services:

  mysql:
    image: mysql:8.4
    container_name: ems-mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ems

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./server

    container_name: ems-backend

    restart: always

    depends_on:
      - mysql

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ems
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: mysecretkey
      JWT_EXPIRES_IN: 1d
      PORT: 5000

    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./client

    container_name: ems-frontend

    restart: always

    depends_on:
      - backend

    ports:
      - "3000:3000"

    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000/api/v1

volumes:
  mysql-data:
